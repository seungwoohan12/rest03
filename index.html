    <!-- Dark mode FOUC 방지 -->
    <script>
      (function() {
        var t = localStorage.getItem('theme');
        var d = window.matchMedia('(prefers-color-scheme: dark)').matches;
        if (t === 'dark' || (!t && d)) {
          document.documentElement.classList.add('dark');
          document.documentElement.style.backgroundColor = '#0B1D3A';
        }
      })();
