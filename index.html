<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%232563EB'/%3E%3Ctext y='70' x='50' text-anchor='middle' font-size='52' font-weight='900' fill='white' font-family='system-ui'%3EAI%3C/text%3E%3C/svg%3E" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="AILearn - AI 기초부터 리터러시까지, AI 시대를 앞서가는 온라인 교육 플랫폼" />
    <meta name="theme-color" content="#0B1D3A" />
    <link rel="preconnect" href="https://cdn.jsdelivr.net" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <title>AILearn - AI 시대를 앞서가는 온라인 교육</title>
    <script>
      (function() {
        var t = localStorage.getItem('theme');
        var d = window.matchMedia('(prefers-color-scheme: dark)').matches;
        if (t === 'dark' || (!t && d)) {
          document.documentElement.classList.add('dark');
          document.documentElement.style.backgroundColor = '#0B1D3A';
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
